<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Letter For You</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Lora:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── Compiled from styles.scss ─────────────────────────── */

    /* Design Tokens */
    :root {
      --plum:        #2B1F2E;
      --cream:       #FFF8F0;
      --paper:       #FFFDF8;
      --aged-gold:   #E8C5A0;
      --dusty-rose:  #D4769A;
      --kraft:       #F5EDE4;
      --kraft-dark:  #E8D5C0;
      --ink:         #3D2B3A;
      --ink-light:   #7A5F74;
      --blush:       #F9E0EE;
      --shadow:      rgba(43, 31, 46, 0.15);
      --shadow-soft: rgba(43, 31, 46, 0.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Inter', 'Trebuchet MS', sans-serif;
      background:
        radial-gradient(ellipse at top left,  rgba(212, 118, 154, 0.18) 0%, transparent 45%),
        radial-gradient(ellipse at bottom right, rgba(232, 197, 160, 0.22) 0%, transparent 40%),
        linear-gradient(160deg, #FFF2F8 0%, #FFF8F0 50%, #FFF0F8 100%);
      overflow: hidden;
      display: grid;
      place-items: center;
    }

    /* Scene */
    .scene {
      position: relative;
      width: min(94vw, 820px);
      height: min(90vh, 600px);
      perspective: 1400px;
      display: grid;
      place-items: center;
    }

    /* Floaties */
    .floaty {
      position: absolute;
      font-size: clamp(16px, 2.2vw, 26px);
      opacity: 0.6;
      user-select: none;
      pointer-events: none;
      animation: drift 7s ease-in-out infinite;
    }
    .floaty:nth-child(1) { top: 6%;     left: 8%;   animation-delay: 0s;    }
    .floaty:nth-child(2) { top: 10%;    right: 10%; animation-delay: 1.8s;  }
    .floaty:nth-child(3) { bottom: 14%; left: 9%;   animation-delay: 3.2s;  }
    .floaty:nth-child(4) { bottom: 8%;  right: 8%;  animation-delay: 2s;    }
    .floaty:nth-child(5) { top: 50%;    left: 4%;   animation-delay: 4.5s;  }

    @keyframes drift {
      0%,  100% { transform: translateY(0)    rotate(0deg); }
      50%        { transform: translateY(-14px) rotate(8deg); }
    }

    /* Mail Wrap */
    .mail-wrap {
      position: relative;
      width: min(88vw, 460px);
      height: 320px;
      cursor: pointer;
      transform-style: preserve-3d;
    }

    /* Hint */
    .hint {
      position: absolute;
      top: -64px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.9);
      color: var(--ink);
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 13px;
      letter-spacing: 0.02em;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 24px var(--shadow-soft);
      white-space: nowrap;
      transition: opacity 0.4s ease, transform 0.4s ease;
      pointer-events: none;
    }
    .mail-wrap.opened .hint {
      opacity: 0;
      transform: translateX(-50%) translateY(-10px);
    }

    /* Envelope */
    .envelope {
      position: absolute;
      inset: 0;
      margin: auto;
      width: 100%;
      height: 270px;
      filter: drop-shadow(0 20px 32px var(--shadow));
    }

    .env-back {
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, var(--kraft) 0%, var(--kraft-dark) 100%);
      border-radius: 20px;
    }

    .env-side {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      z-index: 3;
    }
    .env-side--left {
      left: 0;
      background: linear-gradient(135deg, #dcc5aa, var(--kraft));
      clip-path: polygon(0 0, 100% 50%, 0 100%);
    }
    .env-side--right {
      right: 0;
      background: linear-gradient(225deg, #dcc5aa, var(--kraft));
      clip-path: polygon(100% 0, 0 50%, 100% 100%);
    }

    .env-front {
      position: absolute;
      inset: auto 0 0;
      height: 160px;
      background: linear-gradient(180deg, var(--kraft-dark), #d4bfa8);
      clip-path: polygon(0 0, 50% 62%, 100% 0, 100% 100%, 0 100%);
      border-radius: 0 0 20px 20px;
      z-index: 4;
    }

    /* Flap */
    .flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 148px;
      background: linear-gradient(160deg, var(--kraft) 0%, #e0cdb8 100%);
      clip-path: polygon(0 0, 50% 100%, 100% 0);
      transform-origin: top center;
      transition: transform 1s cubic-bezier(0.2, 0.8, 0.2, 1);
      z-index: 6;
      border-radius: 20px 20px 0 0;
    }
    .mail-wrap.opened .flap { transform: rotateX(180deg); }

    /* Seal */
    .seal {
      position: absolute;
      left: 50%;
      top: 116px;
      transform: translateX(-50%);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.2), transparent 40%), var(--dusty-rose);
      display: grid;
      place-items: center;
      color: rgba(255,255,255,0.85);
      font-size: 20px;
      z-index: 7;
      box-shadow: 0 2px 0 #b85e82, 0 8px 20px rgba(212, 118, 154, 0.35);
      transition: transform 0.5s ease, opacity 0.4s ease;
    }
    .seal::before {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.25);
    }
    .mail-wrap.opened .seal { opacity: 0; transform: translateX(-50%) scale(0.6); }

    /* Letter */
    .letter {
      position: absolute;
      left: 50%;
      bottom: 40px;
      transform: translateX(-50%) translateY(96px);
      width: 84%;
      max-width: 360px;
      min-height: 230px;
      background:
        repeating-linear-gradient(
          transparent,
          transparent 27px,
          rgba(212, 118, 154, 0.10) 28px
        ),
        var(--paper);
      border-radius: 4px 20px 20px 4px;
      padding: 28px 28px 24px;
      color: var(--ink);
      z-index: 2;
      overflow: hidden;
      user-select: none;
      transition: transform 1.1s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.5s ease;
      box-shadow: 0 6px 16px var(--shadow-soft), 0 16px 40px var(--shadow);
    }
    .letter::before {
      content: '';
      position: absolute;
      top: 0; left: 40px; bottom: 0;
      width: 1px;
      background: rgba(212, 118, 154, 0.25);
    }
    .letter::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 0; height: 0;
      border-style: solid;
      border-width: 0 32px 32px 0;
      border-color: transparent var(--kraft) transparent transparent;
    }
    .mail-wrap.opened .letter {
      transform: translateX(-50%) translateY(-104px);
      z-index: 5;
      box-shadow: 0 10px 28px var(--shadow-soft), 0 28px 56px var(--shadow);
    }

    /* Letter Content */
    .letter__greeting {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.05rem;
      font-style: italic;
      color: var(--ink-light);
      margin-bottom: 12px;
      padding-left: 4px;
    }
    .letter__body {
      font-family: 'Lora', Georgia, serif;
      font-size: 0.91rem;
      line-height: 1.78;
      color: var(--ink);
      padding-left: 4px;
    }
    .letter__body.typewriting::after {
      content: '|';
      animation: blink 0.7s step-end infinite;
    }
    .letter__sign-off {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-size: 0.88rem;
      color: var(--ink-light);
      margin-top: 16px;
      padding-left: 4px;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .letter__sign-off.visible { opacity: 1; transform: translateY(0); }

    .letter__author {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--dusty-rose);
      margin-top: 2px;
      padding-left: 4px;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.5s ease 0.2s, transform 0.5s ease 0.2s;
    }
    .letter__author.visible { opacity: 1; transform: translateY(0); }

    .letter-counter {
      position: absolute;
      right: 14px;
      bottom: 12px;
      font-size: 11px;
      color: var(--ink-light);
      opacity: 0.5;
      letter-spacing: 0.05em;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* Actions */
    .actions {
      position: absolute;
      left: 50%;
      bottom: -80px;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease, bottom 0.4s ease;
    }
    .mail-wrap.opened .actions {
      opacity: 1;
      pointer-events: auto;
      bottom: -98px;
    }

    .btn {
      border: none;
      background: white;
      color: var(--ink);
      padding: 10px 18px;
      border-radius: 999px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      letter-spacing: 0.03em;
      box-shadow: 0 6px 18px var(--shadow-soft), 0 2px 6px var(--shadow);
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.2s ease;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 26px var(--shadow-soft), 0 4px 8px var(--shadow);
      background: #fff8fc;
    }
    .btn:active { transform: translateY(0); }
    .btn--primary {
      background: var(--dusty-rose);
      color: white;
    }
    .btn--primary:hover { background: #c4648a; }

    /* Sparkles */
    .sparkle {
      position: absolute;
      font-size: 18px;
      pointer-events: none;
      user-select: none;
      animation: sparkle-pop 900ms ease forwards;
    }
    @keyframes sparkle-pop {
      0%   { opacity: 0; transform: translateY(8px) scale(0.5);              }
      25%  { opacity: 1;                                                       }
      100% { opacity: 0; transform: translateY(-60px) scale(1.3) rotate(12deg); }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .floaty, .sparkle { animation: none; }
      .flap, .seal, .letter, .actions, .hint { transition: none; }
    }

    /* Mobile */
    @media (max-width: 520px) {
      .scene { height: 680px; }
      .mail-wrap { height: 360px; }
      .actions { flex-wrap: wrap; justify-content: center; width: 100%; }
    }
  </style>
</head>
<body>

  <div class="scene" id="scene">
    <!-- Ambient floaties -->
    <span class="floaty" aria-hidden="true">💌</span>
    <span class="floaty" aria-hidden="true">✨</span>
    <span class="floaty" aria-hidden="true">🌸</span>
    <span class="floaty" aria-hidden="true">💕</span>
    <span class="floaty" aria-hidden="true">🌿</span>

    <div class="mail-wrap" id="mail" role="button" aria-label="Open letter" tabindex="0">
      <p class="hint">Click the envelope to open ✦</p>

      <div class="envelope" aria-hidden="true">
        <div class="env-back"></div>

        <!-- Letter lives here, inside the envelope -->
        <div class="letter" id="letter" aria-live="polite">
          <p class="letter__greeting" id="letterGreeting">Dear You,</p>
          <p class="letter__body"    id="letterBody"></p>
          <p class="letter__sign-off" id="letterSignOff">With warmth,</p>
          <p class="letter__author"   id="letterAuthor">A Friend</p>
          <span class="letter-counter" id="letterCounter">1 / 4</span>
        </div>

        <div class="env-side env-side--left"></div>
        <div class="env-side env-side--right"></div>
        <div class="env-front"></div>
        <div class="flap"></div>
        <div class="seal" aria-hidden="true">✦</div>
      </div>

      <!-- Buttons appear after opening -->
      <div class="actions" role="group" aria-label="Letter controls">
        <button class="btn btn--primary" id="closeBtn">Close</button>
        <button class="btn" id="nextBtn">Next letter →</button>
      </div>
    </div>
  </div>

  <script>
    // ── Data — mirrors messages.json ────────────────────────────
    const DATA = {
      "letters": [
        {
          "id": 1,
          "greeting": "Dear You,",
          "body": "Just a tiny note to remind you that soft things can still be strong, kind hearts leave the biggest sparkle, and you make the world feel a little sweeter just by being in it. Keep going — quietly, steadily, beautifully.",
          "sign_off": "With warmth,"
        },
        {
          "id": 2,
          "greeting": "To Someone Wonderful,",
          "body": "If today feels a bit heavy, tuck this little letter in your pocket. You are doing better than you think, and small steps still count as magic. The world notices the light you carry even when you forget it's there.",
          "sign_off": "Rooting for you,"
        },
        {
          "id": 3,
          "greeting": "For You, Always,",
          "body": "Some people feel like sunshine in a handwritten form. This is your reminder that your warmth, your effort, and your little quirks are all deeply lovable. The right people already know this — and they're grateful.",
          "sign_off": "With love,"
        },
        {
          "id": 4,
          "greeting": "Hello, Dear Heart,",
          "body": "Not every day needs to be a masterpiece. Some days are just quiet brushstrokes — and those matter too. Rest when you need to. The painting isn't going anywhere, and neither are the people who admire it.",
          "sign_off": "Tenderly,"
        }
      ],
      "author": "A Friend"
    };

    // ── State ────────────────────────────────────────────────────
    let isOpen      = false;
    let letterIndex = 0;
    let typeTimer   = null;

    // ── DOM refs ─────────────────────────────────────────────────
    const mail          = document.getElementById('mail');
    const letterGreeting = document.getElementById('letterGreeting');
    const letterBody     = document.getElementById('letterBody');
    const letterSignOff  = document.getElementById('letterSignOff');
    const letterAuthor   = document.getElementById('letterAuthor');
    const letterCounter  = document.getElementById('letterCounter');
    const closeBtn       = document.getElementById('closeBtn');
    const nextBtn        = document.getElementById('nextBtn');

    // ── Helpers ──────────────────────────────────────────────────
    function currentLetter() {
      return DATA.letters[letterIndex];
    }

    function updateCounter() {
      letterCounter.textContent = `${letterIndex + 1} / ${DATA.letters.length}`;
    }

    function typewrite(el, text, onDone) {
      clearTimeout(typeTimer);
      el.textContent = '';
      el.classList.add('typewriting');

      let i = 0;
      const speed = 28; // ms per character

      function tick() {
        if (i < text.length) {
          el.textContent += text[i];
          i++;
          typeTimer = setTimeout(tick, speed);
        } else {
          el.classList.remove('typewriting');
          if (onDone) onDone();
        }
      }
      tick();
    }

    function showSignature() {
      letterSignOff.classList.add('visible');
      letterAuthor.textContent = DATA.author;
      letterAuthor.classList.add('visible');
    }

    function renderLetter() {
      const l = currentLetter();
      letterGreeting.textContent = l.greeting;
      letterSignOff.textContent  = l.sign_off;
      letterSignOff.classList.remove('visible');
      letterAuthor.classList.remove('visible');
      updateCounter();

      typewrite(letterBody, l.body, () => {
        setTimeout(showSignature, 200);
      });
    }

    function setOpen(value) {
      isOpen = value;
      mail.classList.toggle('opened', isOpen);
      mail.setAttribute('aria-label', isOpen ? 'Close letter' : 'Open letter');

      if (isOpen) {
        burst();
        renderLetter();
      } else {
        clearTimeout(typeTimer);
        letterBody.classList.remove('typewriting');
      }
    }

    function burst() {
      const icons = ['✨', '💖', '🌸', '💌', '⭐', '🌷'];
      for (let i = 0; i < 10; i++) {
        const s = document.createElement('span');
        s.className = 'sparkle';
        s.textContent = icons[Math.floor(Math.random() * icons.length)];
        s.setAttribute('aria-hidden', 'true');
        s.style.left  = `${80 + Math.random() * 200}px`;
        s.style.top   = `${80 + Math.random() * 60}px`;
        s.style.animationDelay = `${Math.random() * 140}ms`;
        mail.appendChild(s);
        setTimeout(() => s.remove(), 1050);
      }
    }

    // ── Events ───────────────────────────────────────────────────
    mail.addEventListener('click', (e) => {
      if (e.target.tagName.toLowerCase() === 'button') return;
      setOpen(!isOpen);
    });

    mail.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        setOpen(!isOpen);
      }
    });

    closeBtn.addEventListener('click', () => setOpen(false));

    nextBtn.addEventListener('click', () => {
      letterIndex = (letterIndex + 1) % DATA.letters.length;
      // Re-render without closing
      clearTimeout(typeTimer);
      letterSignOff.classList.remove('visible');
      letterAuthor.classList.remove('visible');
      const l = currentLetter();
      letterGreeting.textContent = l.greeting;
      letterSignOff.textContent  = l.sign_off;
      updateCounter();
      burst();
      typewrite(letterBody, l.body, () => {
        setTimeout(showSignature, 200);
      });
    });
  </script>
</body>
</html>
